# Netlify-configuratie voor GripOpAfval
# De @netlify/plugin-nextjs runtime serveert de Next.js-app (SSR + API-routes).
# Preview-deploys: koppel branch "staging" als branch-deploy in de Netlify-UI.

[build]
  command = "npm run build -- --webpack"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[context.staging]
  command = "npm run build -- --webpack"

# Security-headers (geen strikte CSP in v1: Next gebruikt inline scripts).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
