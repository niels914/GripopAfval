name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  kwaliteit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Dependencies installeren
        run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build

      - name: Playwright-browser installeren
        run: npx playwright install --with-deps chromium

      - name: E2e-rooktest (Playwright)
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Playwright-rapport bewaren bij falen
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
